services:
  api:
    build: .
    container_name: backend-api
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: 'mysql://root:root@mysql:3306/app_database'
      DATABASE_USER: 'root'
      DATABASE_PASSWORD: 'root'
      DATABASE_NAME: 'app_database'
      DATABASE_HOST: 'mysql'
      DATABASE_PORT: 3306
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'

  mysql:
    image: mysql:8
    container_name: mysql-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_database
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
